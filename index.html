<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Kitchen Loader (WebGL)</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; }
        
        #ui-panel {
            position: absolute;
            top: 20px; left: 20px;
            width: 240px;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #444;
            z-index: 10;
        }
        
        h2 { margin: 0 0 15px 0; font-weight: 300; font-size: 18px; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .group { margin-bottom: 20px; }
        .group label { display: block; font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 8px; }
        
        .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
        
        .btn {
            background: #333;
            border: 1px solid #555;
            color: #ccc;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            transition: 0.2s;
        }
        .btn:hover { background: #444; color: #fff; }
        .btn.active { background: #555; border-color: #999; color: #fff; }

        #canvas-container { width: 100vw; height: 100vh; }
        
        #loader {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-size: 14px;
            z-index: 20;
        }
        .spinner { 
            width: 50px; height: 50px; 
            border: 4px solid rgba(255,255,255,0.1); 
            border-top-color: #fff; 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
            margin: 0 auto 15px; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        #error-msg { color: #ff5555; display: none; margin-top: 10px; font-size: 12px; max-width: 200px;}
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div id="loading-text">Загрузка модели...</div>
        <div id="error-msg"></div>
    </div>

    <div id="ui-panel">
        <h2>Конструктор</h2>
        
        <div class="group">
            <label>Фасады</label>
            <div class="btn-row">
                <button class="btn active" onclick="updateMaterial('facade', '#e8e6e1')">Белый</button>
                <button class="btn" onclick="updateMaterial('facade', '#5d4037')">Дерево</button>
                <button class="btn" onclick="updateMaterial('facade', '#333')">Графит</button>
            </div>
        </div>

        <div class="group">
            <label>Столешница</label>
            <div class="btn-row">
                <button class="btn active" onclick="updateMaterial('top', '#f5f5f5')">Мрамор</button>
                <button class="btn" onclick="updateMaterial('top', '#3e2723')">Дерево</button>
                <button class="btn" onclick="updateMaterial('top', '#757575')">Бетон</button>
            </div>
        </div>
        
        <div style="font-size: 10px; color: #666; margin-top: 15px;">
            Модель загружена с Google Drive
        </div>
    </div>

    <div id="canvas-container"></div>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // === НАСТРОЙКА СЦЕНЫ ===
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x181818);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    // Камеру отодвинем чуть дальше, чтобы точно увидеть модель любого размера
    camera.position.set(5, 3, 5); 

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0.5, 0);

    // === СВЕТ ===
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.8); // Увеличил яркость
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 2);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    dirLight.shadow.camera.near = 0.1;
    dirLight.shadow.camera.far = 20;
    scene.add(dirLight);

    // === ПЛАТФОРМА (Пол) ===
    const floorGeo = new THREE.PlaneGeometry(50, 50); // Увеличил пол
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // === ЗАГРУЗКА МОДЕЛИ ===
    
    // ИСПРАВЛЕННАЯ ССЫЛКА НА GOOGLE DRIVE
    // Формат: https://drive.google.com/uc?export=download&id=ВАШ_ID
    // ID из вашей ссылки: 1uGBzZkmHp77-UXd9DyF4FK8dQuwAhn4o
    const MODEL_URL = 'https://drive.google.com/uc?export=download&id=1uGBzZkmHp77-UXd9DyF4FK8dQuwAhn4o';

    const loader = new GLTFLoader();
    
    // Хранилища
    let loadedModel = null;
    const modelMaterials = {
        facade: [], // Храним список материалов фасадов
        top: []     // Храним список материалов столешниц
    };

    const errorDiv = document.getElementById('error-msg');
    const loadingText = document.getElementById('loading-text');

    loader.load(
        MODEL_URL,
        (gltf) => {
            loadedModel = gltf.scene;
            
            // Центрируем модель при загрузке
            const box = new THREE.Box3().setFromObject(loadedModel);
            const center = box.getCenter(new THREE.Vector3());
            
            // Сдвигаем модель так, чтобы её низ был на y=0, а центр по x,z был в 0,0
            loadedModel.position.sub(center);
            loadedModel.position.y += (box.max.y - box.min.y) / 2;
            
            // Управление камерой: подстраиваемся под размер модели
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            camera.position.set(maxDim * 1.5, maxDim, maxDim * 1.5);
            controls.target.set(0, size.y / 2, 0);

            // === УМНАЯ ЛОГИКА МАТЕРИАЛОВ ===
            // Мы не знаем названия частей, поэтому будем угадывать по именам
            loadedModel.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;

                    const name = child.name.toLowerCase();
                    
                    // Логика для Фасадов (ищем слова door, front, facade, shutter)
                    if (name.includes('door') || name.includes('front') || name.includes('facade') || name.includes('shutter')) {
                        modelMaterials.facade.push(child.material);
                    }
                    // Логика для Столешницы (ищем top, counter, table)
                    else if (name.includes('top') || name.includes('counter') || name.includes('table')) {
                        modelMaterials.top.push(child.material);
                    }
                    // Если ничего не нашли, но материал выглядит как фасад (не металличен, например)
                    // Это перестраховка, если автор модели называл все Object_001
                    else {
                        // Если у материала есть название, проверяем его
                        if(child.material && child.material.name) {
                            const matName = child.material.name.toLowerCase();
                            if(matName.includes('facade') || matName.includes('door')) {
                                modelMaterials.facade.push(child.material);
                            }
                        }
                    }
                }
            });

            // Если мы ничего не нашли детектированием, применим цвет фасада ко всей модели (кроме пола)
            if (modelMaterials.facade.length === 0 && modelMaterials.top.length === 0) {
                console.warn("Авто-определение деталей не сработало. Применяем цвет ко всей модели.");
                loadedModel.traverse((child) => {
                    if (child.isMesh && child.material) {
                        modelMaterials.facade.push(child.material);
                    }
                });
            }

            scene.add(loadedModel);
            
            // Скрываем лоадер
            document.getElementById('loader').style.display = 'none';
            console.log("Модель успешно загружена!");
        },
        (xhr) => {
            // Прогресс загрузки
            if (xhr.total > 0) {
                const percent = (xhr.loaded / xhr.total * 100).toFixed(0);
                loadingText.innerText = `Загрузка: ${percent}%`;
            } else {
                loadingText.innerText = `Загружено: ${xhr.loaded} байт`;
            }
        },
        (error) => {
            console.error('Ошибка загрузки модели:', error);
            errorDiv.style.display = 'block';
            errorDiv.innerText = 'Ошибка! Google Disk блокирует загрузку. Попробуйте использовать GitHub или откройте консоль (F12) для деталей.';
            loadingText.innerText = "Ошибка CORS";
        }
    );

    // === УПРАВЛЕНИЕ МАТЕРИАЛАМИ ===
    window.updateMaterial = (type, colorHex) => {
        const color = new THREE.Color(colorHex);
        const materialsList = modelMaterials[type];
        
        if (materialsList && materialsList.length > 0) {
            materialsList.forEach(mat => {
                mat.color.set(color);
                
                // Настройки для дерева
                if (type === 'facade' && colorHex === '#5d4037') {
                    mat.roughness = 0.8;
                    mat.metalness = 0.0;
                } else if (type === 'facade') {
                    mat.roughness = 0.3;
                    mat.metalness = 0.1;
                }
            });
        } else {
            console.warn("Материалы для типа " + type + " не найдены.");
        }
    };

    // === АНИМАЦИЯ ===
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    // Адаптив
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

</script>
</body>
</html>
