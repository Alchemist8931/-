<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Kitchen Constructor</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: #fff; }
        
        #ui-panel {
            position: absolute;
            top: 20px; left: 20px;
            width: 280px;
            background: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #444;
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        h2 { margin: 0 0 20px 0; font-weight: 300; font-size: 20px; border-bottom: 1px solid #555; padding-bottom: 10px; }
        .group { margin-bottom: 25px; }
        .group label { display: block; font-size: 11px; color: #aaa; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px;}
        
        .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
        
        .btn {
            background: #333;
            border: 1px solid #555;
            color: #ccc;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
            flex: 1;
            text-align: center;
        }
        .btn:hover { background: #444; color: #fff; border-color: #777; }
        .btn.active { background: #555; border-color: #aaa; color: #fff; }

        select {
            width: 100%;
            padding: 8px;
            background: #222;
            border: 1px solid #555;
            color: #fff;
            border-radius: 5px;
            margin-bottom: 15px;
            cursor: pointer;
        }
        select:focus { outline: none; border-color: #888; }

        #canvas-container { width: 100vw; height: 100vh; }
        
        #loader {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-size: 16px;
            z-index: 20;
        }
        .spinner { 
            width: 50px; height: 50px; 
            border: 4px solid rgba(255,255,255,0.1); 
            border-top-color: #fff; 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
            margin: 0 auto 15px; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .hint { font-size: 10px; color: #666; margin-top: 5px; line-height: 1.4; }
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div id="loading-text">Загрузка модели...</div>
    </div>

    <div id="ui-panel">
        <h2>Конструктор</h2>
        
        <div class="group">
            <label>Шаг 1: Выберите материал фасада</label>
            <select id="material-select">
                <option value="">Загрузка списка...</option>
            </select>
            <div class="hint">Выберите материал из списка, который хотите перекрасить.</div>
        </div>

        <div class="group">
            <label>Шаг 2: Цвет фасада</label>
            <div class="btn-row">
                <button class="btn" onclick="setColor('#e8e6e1')">Белый</button>
                <button class="btn" onclick="setColor('#5d4037')">Дуб</button>
                <button class="btn" onclick="setColor('#333')">Графит</button>
                <button class="btn" onclick="setColor('#1e3a5f')">Синий</button>
            </div>
        </div>

        <div class="group">
            <label>Цвет столешницы</label>
            <div class="btn-row">
                <button class="btn" onclick="setColor('#f5f5f5')">Мрамор</button>
                <button class="btn" onclick="setColor('#3e2723')">Дерево</button>
                <button class="btn" onclick="setColor('#757575')">Бетон</button>
            </div>
        </div>
    </div>

    <div id="canvas-container"></div>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // === НАСТРОЙКА СЦЕНЫ ===
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x222222); // Немного светлее фон

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(5, 3, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0; // Стандартная экспозиция
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // === УЛУЧШЕННОЕ ОСВЕЩЕНИЕ (Чтобы модель не была черной) ===
    
    // 1. Мягкое окружающее освещение (имитация света от стен)
    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.5);
    hemiLight.position.set(0, 20, 0);
    scene.add(hemiLight);

    // 2. Основной направленный свет (Солнце)
    const dirLight = new THREE.DirectionalLight(0xffffff, 3);
    dirLight.position.set(10, 20, 10);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    scene.add(dirLight);

    // 3. Дополнительный свет сзади, чтобы не было черных пятен
    const backLight = new THREE.DirectionalLight(0xffffff, 1.5);
    backLight.position.set(-10, 10, -10);
    scene.add(backLight);

    // === ПОЛ ===
    const floorGeo = new THREE.PlaneGeometry(100, 100);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.8 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // === ЗАГРУЗКА МОДЕЛИ ===
    const MODEL_URL = './kitchen.glb'; 
    
    const loader = new GLTFLoader();
    const materialSelect = document.getElementById('material-select');
    
    // Карта материалов: Имя -> Объект материала
    const materialsMap = new Map();

    loader.load(
        MODEL_URL,
        (gltf) => {
            const model = gltf.scene;
            
            // 1. Автоматический подбор масштаба
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());
            
            model.position.y = -box.min.y; // На пол
            model.position.x = -center.x;
            model.position.z = -center.z;

            // Настройка камеры
            const maxDim = Math.max(size.x, size.y, size.z);
            const fov = camera.fov * (Math.PI / 180);
            let cameraZ = Math.abs(maxDim / Math.sin(fov / 2)) * 0.8;
            camera.position.set(cameraZ * 0.5, cameraZ * 0.5, cameraZ);
            controls.target.set(0, size.y / 2, 0);
            controls.update();

            // 2. Сбор всех материалов для списка
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;

                    // Делаем материал двусторонним (чтобы не исчезали стены при взгляде внутри)
                    if (child.material) {
                        child.material.side = THREE.DoubleSide;
                    }

                    // Собираем уникальные материалы
                    if (child.material) {
                        // Если материал используется несколькими мешами, Map гарантирует уникальность
                        if (!materialsMap.has(child.material.name)) {
                            materialsMap.set(child.material.name, child.material);
                        }
                    }
                }
            });

            // Заполняем выпадающий список
            materialSelect.innerHTML = '<option value="">-- Выберите материал --</option>';
            materialsMap.forEach((value, key) => {
                const opt = document.createElement('option');
                // Если имя пустое, даем дефолтное
                const name = key ? key : `Material_${value.id}`;
                opt.value = key; // используем имя как ключ
                opt.innerText = name;
                materialSelect.appendChild(opt);
            });

            scene.add(model);
            document.getElementById('loader').style.display = 'none';
        },
        (xhr) => {
            const percent = xhr.total ? (xhr.loaded / xhr.total * 100).toFixed(0) : (xhr.loaded / 1024).toFixed(0) + 'kb';
            document.getElementById('loading-text').innerText = `Загрузка: ${percent}%`;
        },
        (error) => {
            console.error(error);
            document.getElementById('loading-text').innerText = 'Ошибка загрузки файла. Проверьте консоль (F12).';
            document.getElementById('loading-text').style.color = '#ff4444';
        }
    );

    // === УПРАВЛЕНИЕ МАТЕРИАЛАМИ ===
    window.setColor = (colorHex) => {
        const selectedName = materialSelect.value;
        
        if (!selectedName) {
            alert("Пожалуйста, выберите материал из списка выше, чтобы перекрасить.");
            return;
        }

        const material = materialsMap.get(selectedName);
        
        if (material) {
            material.color.set(colorHex);
            
            // Сбрасываем текстуру, если она была (иначе цвет не видно под текстурой)
            // Сохраняем возможность вернуть текстуры, но для смены цвета это необходимо
            if (material.map) {
                material.map = null; 
                material.needsUpdate = true;
            }
            
            // Настройки свойств
            material.roughness = 0.4;
            material.metalness = 0.1;
        }
    };

    // === АНИМАЦИЯ ===
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
