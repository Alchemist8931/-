<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Kitchen Constructor (WebGL)</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #111; color: #fff; }
        
        /* UI Panel */
        #ui-panel {
            position: absolute;
            top: 20px; left: 20px;
            width: 240px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #333;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        h2 { margin: 0 0 15px 0; font-weight: 300; font-size: 18px; border-bottom: 1px solid #444; padding-bottom: 10px; }
        
        .control-group { margin-bottom: 20px; }
        .control-group label { display: block; font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 8px; }
        
        .options-row { display: flex; gap: 8px; flex-wrap: wrap; }
        
        .btn {
            background: #333;
            border: 1px solid #444;
            color: #ccc;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            transition: 0.2s;
        }
        .btn:hover { background: #444; color: #fff; }
        .btn.active { background: #555; border-color: #888; color: #fff; }

        .color-circle {
            width: 20px; height: 20px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            display: inline-block;
            margin-right: 5px;
            vertical-align: middle;
        }

        /* Canvas Container */
        #canvas-container { width: 100vw; height: 100vh; }
        
        /* Loader */
        #loader {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            transition: opacity 0.5s;
        }
        .spinner { width: 40px; height: 40px; border: 3px solid #333; border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    
    <!-- Подключаем Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div>Загрузка сцены...</div>
    </div>

    <div id="ui-panel">
        <h2>Конструктор</h2>
        
        <div class="control-group">
            <label>Материалы фасада</label>
            <div class="options-row">
                <button class="btn active" onclick="changeMaterial('facade', '#e8e6e1')">
                    <span class="color-circle" style="background:#e8e6e1;"></span>Белый
                </button>
                <button class="btn" onclick="changeMaterial('facade', '#5d4037')">
                    <span class="color-circle" style="background:#5d4037;"></span>Дуб
                </button>
                <button class="btn" onclick="changeMaterial('facade', '#333')">
                    <span class="color-circle" style="background:#333;"></span>Графит
                </button>
            </div>
        </div>

        <div class="control-group">
            <label>Столешница</label>
            <div class="options-row">
                <button class="btn active" onclick="changeMaterial('counter', '#f0f0f0')">Мрамор</button>
                <button class="btn" onclick="changeMaterial('counter', '#4e342e')">Дерево</button>
                <button class="btn" onclick="changeMaterial('counter', '#555')">Камень</button>
            </div>
        </div>

        <div class="control-group">
            <label>Фурнитура</label>
            <div class="options-row">
                <button class="btn active" onclick="changeMaterial('handles', '#c0c0c0')">Хром</button>
                <button class="btn" onclick="changeMaterial('handles', '#d4af37')">Золото</button>
                <button class="btn" onclick="changeMaterial('handles', '#111')">Чёрный</button>
            </div>
        </div>
    </div>

    <div id="canvas-container"></div>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    // Импорт загрузчика моделей (для будущих моделей с 3ddd)
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // === ИНИЦИАЛИЗАЦИЯ СЦЕНЫ ===
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(5, 3, 5); // Позиция камеры

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true; // Включаем тени
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping; // Кинематографичное освещение
    renderer.toneMappingExposure = 1.2;
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    // Управление камерой (Orbit Controls)
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.target.set(0, 0.5, 0); // Смотрим в центр кухни

    // === ОСВЕЩЕНИЕ ===
    // Мягкое окружающее освещение
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    // Основной направленный свет (Солнце)
    const dirLight = new THREE.DirectionalLight(0xffffff, 1);
    dirLight.position.set(5, 10, 7);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    dirLight.shadow.camera.near = 0.1;
    dirLight.shadow.camera.far = 50;
    dirLight.shadow.camera.left = -10;
    dirLight.shadow.camera.right = 10;
    dirLight.shadow.camera.top = 10;
    dirLight.shadow.camera.bottom = -10;
    scene.add(dirLight);

    // === МАТЕРИАЛЫ (PBR) ===
    // Мы создаем материалы, к которым будем обращаться по имени
    const materials = {
        facade: new THREE.MeshStandardMaterial({ 
            color: 0xe8e6e1, 
            roughness: 0.3, 
            metalness: 0.0 
        }),
        counter: new THREE.MeshStandardMaterial({ 
            color: 0xf0f0f0, 
            roughness: 0.1, 
            metalness: 0.1 
        }),
        handles: new THREE.MeshStandardMaterial({ 
            color: 0xc0c0c0, 
            roughness: 0.1, 
            metalness: 0.8 
        }),
        body: new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.8 })
    };

    // === ГЕНЕРАЦИЯ "ПРОКСИ" МОДЕЛИ (Вместо загрузки внешней) ===
    // В реальном проекте вы замените этот блок на загрузчик GLTFLoader
    const kitchenGroup = new THREE.Group();

    // Пол
    const floorGeo = new THREE.PlaneGeometry(10, 10);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x2a2520, roughness: 0.8 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // Стена
    const wallGeo = new THREE.PlaneGeometry(10, 5);
    const wallMat = new THREE.MeshStandardMaterial({ color: 0xf0ede8 });
    const wall = new THREE.Mesh(wallGeo, wallMat);
    wall.position.set(0, 2.5, -2);
    scene.add(wall);

    // Создаем простые геометрические формы, имитирующие кухню
    // Тумба 1
    const cabGeo = new THREE.BoxGeometry(1, 0.8, 0.6);
    const cab1 = new THREE.Mesh(cabGeo, materials.body);
    cab1.position.set(-1, 0.4, -1.7);
    cab1.castShadow = true;
    cab1.receiveShadow = true;
    kitchenGroup.add(cab1);

    // Фасад тумбы (отдельно для смены цвета)
    const facadeGeo = new THREE.BoxGeometry(0.98, 0.78, 0.02);
    const fac1 = new THREE.Mesh(facadeGeo, materials.facade);
    fac1.position.set(-1, 0.4, -1.4); // Чуть спереди корпуса
    fac1.castShadow = true;
    kitchenGroup.add(fac1);

    // Ручка
    const handleGeo = new THREE.CylinderGeometry(0.01, 0.01, 0.15, 8);
    const handle1 = new THREE.Mesh(handleGeo, materials.handles);
    handle1.rotation.x = Math.PI / 2;
    handle1.position.set(-0.7, 0.5, -1.38);
    kitchenGroup.add(handle1);

    // Столешница
    const topGeo = new THREE.BoxGeometry(3, 0.04, 0.65);
    const counterTop = new THREE.Mesh(topGeo, materials.counter);
    counterTop.position.set(0, 0.82, -1.7);
    counterTop.castShadow = true;
    counterTop.receiveShadow = true;
    kitchenGroup.add(counterTop);

    // Верхний шкаф
    const upperCab = new THREE.Mesh(new THREE.BoxGeometry(1, 0.7, 0.35), materials.body);
    upperCab.position.set(-1, 1.8, -1.8);
    kitchenGroup.add(upperCab);
    
    const upperFac = new THREE.Mesh(new THREE.BoxGeometry(0.98, 0.68, 0.02), materials.facade);
    upperFac.position.set(-1, 1.8, -1.62);
    kitchenGroup.add(upperFac);

    scene.add(kitchenGroup);

    const loader = new GLTFLoader();
    loader.load(
        'path/to/your/model.glb', // Сюда вставить ссылку на файл
        (gltf) => {
            const model = gltf.scene;
            model.scale.set(1, 1, 1); // Подгонка размера
            model.position.set(0, 0, 0);
            
            // Важно: проходим по всем частям модели и назначаем им наши материалы
            // Это делается либо здесь вручную по именам, либо материал должен быть настроен в Blender
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                    // Пример логики назначения:
                    if(child.name.includes('Facade')) child.material = materials.facade;
                    if(child.name.includes('Handle')) child.material = materials.handles;
                }
            });
            
            scene.add(model);
            document.getElementById('loader').style.opacity = 0;
        },
        (xhr) => {
            console.log((xhr.loaded / xhr.total * 100) + '% loaded');
        },
        (error) => {
            console.error('Error loading model:', error);
        }
    );

    // Скрываем лоадер после генерации прокси
    document.getElementById('loader').style.opacity = 0;

    // === ЛОГИКА КОНСТРУКТОРА ===
    window.changeMaterial = (type, colorHex) => {
        const color = new THREE.Color(colorHex);
        
        if (type === 'facade') {
            materials.facade.color = color;
            // Для текстур можно было бы менять map: materials.facade.map = textureLoader.load('wood.jpg');
        } else if (type === 'counter') {
            materials.counter.color = color;
        } else if (type === 'handles') {
            materials.handles.color = color;
        }
        
        // Обновляем UI
        const btns = document.querySelectorAll('.control-group .btn');
        // (Здесь логика переключения активной кнопки для наглядности)
    };

    // === АНИМАЦИОННЫЙ ЦИКЛ ===
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    // Адаптив
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

</script>
</body>
</html>
