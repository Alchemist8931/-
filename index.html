<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Kitchen Loader (WebGL)</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; }
        
        #ui-panel {
            position: absolute;
            top: 20px; left: 20px;
            width: 240px;
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #444;
            z-index: 10;
        }
        
        h2 { margin: 0 0 15px 0; font-weight: 300; font-size: 18px; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .group { margin-bottom: 20px; }
        .group label { display: block; font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 8px; }
        
        .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
        
        .btn {
            background: #333;
            border: 1px solid #555;
            color: #ccc;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            transition: 0.2s;
        }
        .btn:hover { background: #444; color: #fff; }
        .btn.active { background: #555; border-color: #999; color: #fff; }

        #canvas-container { width: 100vw; height: 100vh; }
        
        #loader {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-size: 14px;
            z-index: 20;
        }
        .spinner { 
            width: 50px; height: 50px; 
            border: 4px solid rgba(255,255,255,0.1); 
            border-top-color: #fff; 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
            margin: 0 auto 15px; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div id="loading-text">Загрузка модели...</div>
    </div>

    <div id="ui-panel">
        <h2>Конструктор</h2>
        
        <div class="group">
            <label>Фасады</label>
            <div class="btn-row">
                <button class="btn active" onclick="updateMaterial('facade', '#e8e6e1')">Белый</button>
                <button class="btn" onclick="updateMaterial('facade', '#5d4037')">Дерево</button>
                <button class="btn" onclick="updateMaterial('facade', '#333')">Графит</button>
            </div>
        </div>

        <div class="group">
            <label>Столешница</label>
            <div class="btn-row">
                <button class="btn active" onclick="updateMaterial('top', '#f5f5f5')">Мрамор</button>
                <button class="btn" onclick="updateMaterial('top', '#3e2723')">Дерево</button>
                <button class="btn" onclick="updateMaterial('top', '#757575')">Бетон</button>
            </div>
        </div>
        
        <div style="font-size: 10px; color: #666; margin-top: 15px;">
            Модель загружена из внешнего источника
        </div>
    </div>

    <div id="canvas-container"></div>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // === НАСТРОЙКА СЦЕНЫ ===
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x181818);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(4, 2, 4);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0.5, 0);

    // === СВЕТ ===
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 2);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    dirLight.shadow.camera.near = 0.1;
    dirLight.shadow.camera.far = 20;
    scene.add(dirLight);

    // === ПЛАТФОРМА (Пол) ===
    const floorGeo = new THREE.PlaneGeometry(20, 20);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // === ЗАГРУЗКА МОДЕЛИ ===
    
    // Ссылка на модель-пример. 
    // Вы можете заменить её на ссылку с GitHub (jsdelivr) или другую прямую ссылку.
    // Например, эта ссылка ведет на стандартную модель Ferrari из примеров Three.js
    const MODEL_URL = 'https://sketchfab.com/3d-models/kitchen-886911d5e18f43f2821c7424dcc5029c#download:~:text=the%20source%20upload.-,DOWNLOAD,-.glb';
    
    // Если у вас есть ссылка на кухню, замените строку выше на вашу, например:
    // const MODEL_URL = 'https://cdn.jsdelivr.net/gh/user/repo/kitchen.glb';

    const loader = new GLTFLoader();
    let loadedModel = null;

    // Хранилище материалов для перекраски
    const modelMaterials = {
        facade: null,
        top: null,
        handles: null
    };

    loader.load(
        MODEL_URL,
        (gltf) => {
            loadedModel = gltf.scene;
            
            // Настраиваем модель
            loadedModel.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                    
                    // === ЛОГИКА РАСПРЕДЕЛЕНИЯ МАТЕРИАЛОВ ===
                    // Так как мы загрузили чужую модель (машину), мы симулируем кухню.
                    // В реальной модели кухни имена частей будут другими.
                    // Например: if (child.name.includes('Door')) ...
                    
                    // Для Ferrari:
                    // Кузов машины -> Фасад кухни
                    if (child.name === 'body') { 
                        modelMaterials.facade = child.material;
                    }
                    // Колеса/детали -> Столешница/Ручки
                    if (child.name === 'rim_fl') { // Пример колеса
                        modelMaterials.top = child.material;
                    }
                    if (child.name === 'glass') { // Пример стекла
                         modelMaterials.handles = child.material;
                    }
                }
            });

            scene.add(loadedModel);
            
            // Скрываем лоадер
            document.getElementById('loader').style.display = 'none';
        },
        (xhr) => {
            // Прогресс загрузки
            const percent = (xhr.loaded / xhr.total * 100).toFixed(0);
            document.getElementById('loading-text').innerText = `Загрузка: ${percent}%`;
        },
        (error) => {
            console.error('Ошибка загрузки модели:', error);
            document.getElementById('loading-text').innerText = 'Ошибка загрузки';
        }
    );

    // === УПРАВЛЕНИЕ МАТЕРИАЛАМИ ===
    window.updateMaterial = (type, colorHex) => {
        const color = new THREE.Color(colorHex);
        
        // Находим материал в нашем сохраненном списке и меняем цвет
        if (modelMaterials[type]) {
            modelMaterials[type].color.set(color);
            
            // Если меняем фасад на "дерево", можно добавить шероховатость
            if (type === 'facade' && colorHex === '#5d4037') {
                modelMaterials[type].roughness = 0.8;
                modelMaterials[type].metalness = 0.0;
            } else if (type === 'facade') {
                modelMaterials[type].roughness = 0.3;
                modelMaterials[type].metalness = 0.1;
            }
        }
        
        // UI active state
        const btns = document.querySelectorAll('.btn');
        // (опционально: подсветка активной кнопки)
    };

    // === АНИМАЦИЯ ===
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    // Адаптив
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

</script>
</body>
</html>
