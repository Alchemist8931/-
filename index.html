<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Kitchen Constructor</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; }
        
        #ui-panel {
            position: absolute;
            top: 20px; left: 20px;
            width: 260px;
            background: rgba(20, 20, 20, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #333;
            z-index: 10;
        }
        
        h2 { margin: 0 0 20px 0; font-weight: 300; font-size: 18px; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .group { margin-bottom: 20px; }
        .group label { display: block; font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px;}
        
        .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
        
        .btn {
            background: #333;
            border: 1px solid #555;
            color: #ccc;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            transition: 0.2s;
        }
        .btn:hover { background: #444; color: #fff; border-color: #777; }
        .btn.active { background: #555; border-color: #aaa; color: #fff; }

        #canvas-container { width: 100vw; height: 100vh; }
        
        #loader {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            font-size: 14px;
            z-index: 20;
        }
        .spinner { 
            width: 50px; height: 50px; 
            border: 4px solid rgba(255,255,255,0.1); 
            border-top-color: #fff; 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
            margin: 0 auto 15px; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Скрытый лог для отладки */
        #debug-log {
            position: absolute;
            bottom: 10px; right: 10px;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            font-size: 10px;
            color: #0f0;
            pointer-events: none;
            max-height: 100px;
            overflow: hidden;
            white-space: pre;
        }
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div id="loading-text">Загрузка модели...</div>
    </div>

    <div id="ui-panel">
        <h2>Конструктор</h2>
        
        <div class="group">
            <label>Фасады</label>
            <div class="btn-row">
                <button class="btn active" onclick="updateMaterial('facade', '#e8e6e1')">Белый</button>
                <button class="btn" onclick="updateMaterial('facade', '#5d4037')">Дуб</button>
                <button class="btn" onclick="updateMaterial('facade', '#333')">Графит</button>
            </div>
        </div>

        <div class="group">
            <label>Столешница</label>
            <div class="btn-row">
                <button class="btn active" onclick="updateMaterial('top', '#f5f5f5')">Мрамор</button>
                <button class="btn" onclick="updateMaterial('top', '#3e2723')">Дерево</button>
                <button class="btn" onclick="updateMaterial('top', '#757575')">Бетон</button>
            </div>
        </div>
    </div>
    
    <div id="debug-log"></div>

    <div id="canvas-container"></div>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const log = (msg) => { document.getElementById('debug-log').innerText += msg + '\n'; console.log(msg); };

    // === НАСТРОЙКА СЦЕНЫ ===
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x181818);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(5, 3, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // === СВЕТ ===
    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
    dirLight.position.set(10, 20, 10);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    scene.add(dirLight);

    // === ПОЛ ===
    const floorGeo = new THREE.PlaneGeometry(50, 50);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // === ЗАГРУЗКА МОДЕЛИ ===
    
    // Используем относительный путь, так как файл лежит рядом
    const MODEL_URL = './kitchen.glb'; 
    
    const loader = new GLTFLoader();
    const modelMaterials = {
        facade: [], // Список материалов фасадов
        top: [],    // Список материалов столешниц
        handles: [] // Список материалов ручек
    };

    loader.load(
        MODEL_URL,
        (gltf) => {
            const model = gltf.scene;
            
            // 1. Автоматический подбор масштаба и позиции
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());
            
            // Выравниваем модель по полу
            model.position.y = -box.min.y;
            // Центрируем по горизонтали
            model.position.x = -center.x;
            model.position.z = -center.z;

            // Настраиваем камеру, чтобы вся модель была видна
            const maxDim = Math.max(size.x, size.y, size.z);
            const fov = camera.fov * (Math.PI / 180);
            let cameraZ = Math.abs(maxDim / Math.sin(fov / 2)) * 0.8;
            
            camera.position.set(cameraZ * 0.5, cameraZ * 0.5, cameraZ);
            controls.target.set(0, size.y / 2, 0);
            controls.update();

            // 2. Умное распределение материалов
            log("--- Загрузка завершена ---");
            
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                    
                    // Собираем имена для отладки
                    const name = child.name.toLowerCase();
                    const matName = child.material ? child.material.name.toLowerCase() : "";
                    
                    // Логика поиска:
                    // Ищем фасады по ключевым словам
                    if (name.includes('door') || name.includes('facade') || name.includes('front') || 
                        matName.includes('facade') || matName.includes('door') || matName.includes('white')) {
                        modelMaterials.facade.push(child.material);
                        log(`Found Facade: ${child.name}`);
                    }
                    // Ищем столешницу
                    else if (name.includes('top') || name.includes('counter') || name.includes('table') ||
                             matName.includes('top') || matName.includes('counter')) {
                        modelMaterials.top.push(child.material);
                        log(`Found Top: ${child.name}`);
                    }
                    // Ищем ручки
                    else if (name.includes('handle') || name.includes('knob') || name.includes('metal')) {
                        modelMaterials.handles.push(child.material);
                        log(`Found Handle: ${child.name}`);
                    }
                }
            });

            // Если ничего не нашли по именам, красим всё в "Фасад" (кроме того, что похоже на пол)
            if (modelMaterials.facade.length === 0 && modelMaterials.top.length === 0) {
                log("Имена не найдены, применяем цвет ко всей модели");
                model.traverse(child => {
                    if(child.isMesh) modelMaterials.facade.push(child.material);
                });
            }

            scene.add(model);
            document.getElementById('loader').style.display = 'none';
        },
        (xhr) => {
            const percent = xhr.total ? (xhr.loaded / xhr.total * 100).toFixed(0) : (xhr.loaded / 1024).toFixed(0) + 'kb';
            document.getElementById('loading-text').innerText = `Загрузка: ${percent}%`;
        },
        (error) => {
            console.error(error);
            document.getElementById('loading-text').innerText = 'Ошибка загрузки файла.';
            document.getElementById('loading-text').style.color = '#ff4444';
            log("ОШИБКА: Проверьте, запущен ли локальный сервер.");
            log("Если вы открываете файл просто с диска, браузер заблокирует загрузку.");
        }
    );

    // === УПРАВЛЕНИЕ МАТЕРИАЛАМИ ===
    window.updateMaterial = (type, colorHex) => {
        const color = new THREE.Color(colorHex);
        const list = modelMaterials[type];
        
        if (list && list.length > 0) {
            list.forEach(mat => {
                mat.color.set(color);
                
                // Настройки пластика/дерева
                if (type === 'facade') {
                    if (colorHex === '#5d4037') {
                        mat.roughness = 0.7; // Дерево более шершавое
                        mat.metalness = 0.0;
                    } else {
                        mat.roughness = 0.3; // Глянец
                        mat.metalness = 0.0;
                    }
                }
            });
        } else {
            console.warn("Материалы типа " + type + " не найдены в модели.");
        }
    };

    // === АНИМАЦИЯ ===
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
